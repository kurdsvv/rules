#测试
parsers: # array
  - url: 
  # - reg: ^.*$ 匹配所有订阅，或  - url: https://example.com/profile.yaml 指定订阅
  # 下面是删除服务商自带的策略组和规则
    code: |
      module.exports.parse = (raw, { yaml }) => {
        const rawObj = yaml.parse(raw)
        const groups = []
        const rules = []
        return yaml.stringify({ ...rawObj, 'proxy-groups': groups, rules })
      } 
  # 建立自己的配置
    yaml:
      prepend-proxy-groups: # 建立策略组
      - name: 🚀 节点选择
        type: fallback
        url: http://www.gstatic.com/generate_204
        interval: 86400
        proxies:
         - 'VMness-香港'
         - 'VMness-台湾'
         - 'VMness-日本'
         
         
      - name: 🎯 Telegram-vmess
        type: fallback
        url: http://www.gstatic.com/generate_204
        interval: 86400
        proxies:
         - 'VMness-越南'
         - 'VMness-美国'
         - 'VMness-荷兰'


      - name: ♻️ 自动选择
        type: fallback
        url: http://www.gstatic.com/generate_204
        interval: 120
        proxies:
          - 'VMness-台湾'
          - 'VMness-美国'
          - 'VMness-欧洲'
          
          
      - name: MATCH
        type: select
        proxies:
          - ♻️ 自动选择
          - DIRECT



      - name: VMness-香港
        type: load-balance
        strategy: round-robin 
        url: http://www.google.com/generate_204
        interval: 86400
      
      - name: VMness-台湾
        type: load-balance
        strategy: round-robin 
        url: http://www.google.com/generate_204
        interval: 86400
      
      - name: VMness-日本
        type: load-balance
        strategy: round-robin 
        url: http://www.google.com/generate_204
        interval: 86400
      
      - name: VMness-越南
        type: load-balance
        strategy: round-robin 
        url: http://www.google.com/generate_204
        interval: 86400

      - name: VMness-美国
        type: load-balance
        strategy: round-robin 
        url: http://www.google.com/generate_204
        interval: 86400
      

      - name: VMness-荷兰
        type: load-balance
        strategy: round-robin 
        url: http://www.google.com/generate_204
        interval: 86400
              
  # 策略组示例
      # - name: 分组名
        # type: select       # 手动选点   
        # url-test     # 自动选择延迟最低的节点
        # fallback     # 节点故障时自动切换下一个
        # laod-balance # 均衡使用分组内的节点
        # url: http://www.gstatic.com/generate_204 # 测试地址 非select类型分组必要
        # interval: 300 # 自动测试间隔时间，单位秒 非select类型分组必要
        # tolerance: 50 # 允许的偏差，节点之间延迟差小于该值不切换 非必要
        # proxies:  
          # - 节点名称或其他分组套娃
          
      commands:
        - proxy-groups.(🚀 节点选择).proxies=[]proxyNames
        - proxy-groups.(🎯 Telegram-vmess).proxies=[]proxyNames
        - proxy-groups.(♻️ 自动选择).proxies=[]proxyNames
        - proxy-groups.(MATCH).proxies=[]proxyNames
        - proxy-groups.VMness-香港.proxies=[]proxyNames|港|香港|🇭🇰|HK|Hong Kong # 向指定策略组添加订阅中的节点名，可使用正则过滤
        - proxy-groups.VMness-台湾.proxies=[]proxyNames|台|台湾|新北|彰化|TW|Taiwan
        - proxy-groups.VMness-日本.proxies=[]proxyNames|日|日本|🇯🇵|川日|东京|大阪|泉日|埼玉|沪日|深日|[^-]日|JP|Japan
        - proxy-groups.VMness-越南.proxies=[]proxyNames|越南
        - proxy-groups.VMness-美国.proxies=[]proxyNames|美|美国|🇺🇸|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|United States
        - proxy-groups.VMness-欧洲.proxies=[]proxyNames|德|法国|法|法国
        - proxy-groups.VMness-荷兰.proxies=[]proxyNames|^[^香日台美法德]*$ # 这个可以自定义，这个正则的意思是排除节点名字有“香日台新韩美”的节点。
        - mixed-port=7677

       # 为各个策略组添加一个DIRECT，避免机场节点无法匹配上面的正则筛选而导致配置出错。应该有其他办法避免，但是我不会。


        # - proxy-groups.节点名字.proxies.0+DIRECT # 向指定分组第一个位置添加一个 DIRECT 节点名
        # 一些可能用到的正则过滤节点示例，使分组更细致
        # []proxyNames|a                         # 包含a
        # []proxyNames|^(.*)(a|b)+(.*)$          # 包含a或b
        # []proxyNames|^(?=.*a)(?=.*b).*$        # 包含a和b
        # []proxyNames|^((?!b).)*a((?!b).)*$     # 包含a且不包含b
        # []proxyNames|^((?!b|c).)*a((?!b|c).)*$ # 包含a且不包含b或c
        # 更多正则教程，请看这里：https://deerchao.cn/tutorials/regex/regex.htm#top
        
  # 添加规则
      prepend-rules: # 规则由上往下遍历，如上面规则已经命中，则不再往下处理
        - RULE-SET,reject,REJECT
        - RULE-SET,Myrejetct,REJECT
        - RULE-SET,proxy,🚀 节点选择
        - RULE-SET,private,♻️ 自动选择
        - RULE-SET,telegramcidr,🎯 Telegram-vmess
        - RULE-SET,direct,DIRECT
        - RULE-SET,cncidr,DIRECT
        - RULE-SET,lancidr,DIRECT
         - MATCH,MATCH

      # 添加规则集
        # DOMAIN-SUFFIX：域名后缀匹配
        # DOMAIN：域名匹配
        # DOMAIN-KEYWORD：域名关键字匹配
        # IP-CIDR：IP段匹配
        # SRC-IP-CIDR：源IP段匹配
        # GEOIP：GEOIP数据库（国家代码）匹配
        # DST-PORT：目标端口匹配
        # SRC-PORT：源端口匹配
        # PROCESS-NAME：源进程名匹配
        # RULE-SET：Rule Provider规则匹配
        # MATCH：全匹配

  # 添加规则集
      mix-rule-providers: 

        Myrejetct: 
          type: http
          behavior: domain
          url: "https://anti-ad.net/clash.yaml"
          path: ./ruleset/Myrejetct.yaml
          interval: 86400
          
        cncidr: 
          type: http
          behavior: ipcidr
          url: https://download-1302801676.cos.ap-shanghai.myqcloud.com/Geo_AS_IP/Geo_AS_IP_CN_All_Clash.yaml
          path: ./ruleset/cncidr.yaml
          interval: 86400

          
        proxy: 
          type: http
          behavior: domain
          url: https://raw.githubusercontent.com/kurdsvv/rules/master/Clash-Rule/proxy.txt
          path: ./ruleset/proxy.yaml
          interval: 86400
          
          
          
        direct: 
          type: http
          behavior: domain
          url: https://raw.githubusercontent.com/kurdsvv/rules/master/Clash-Rule/direct.txt
          path: ./ruleset/direct.yaml
          interval: 86400
          

          
        lancidr: 
          type: http
          behavior: ipcidr
          url: https://raw.githubusercontent.com/kurdsvv/rules/master/Clash-Rule/lancidr.txt
          path: ./ruleset/lancidr.yaml
          interval: 86400
          
          
        telegramcidr: 
          type: http
          behavior: ipcidr
          url: https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/telegramcidr.txt
          path: ./ruleset/telegramcidr.yaml
          interval: 86400


        private:
          type: http
          behavior: domain
          url: https://raw.githubusercontent.com/kurdsvv/rules/master/Clash-Rule/private.txt
          path: ./ruleset/private.yaml
          interval: 86400
        reject: 
          type: http
          behavior: domain
          url: https://raw.githubusercontent.com/kurdsvv/rules/master/Clash-Rule/Reject.txt
          path: ./ruleset/reject.yaml
          interval: 86400
      
